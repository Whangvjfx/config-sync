# -------------------------------------------------------------------
# Android 适配版 - Clash Meta (Mihomo) 配置
# -------------------------------------------------------------------

# 基础设置
port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false # 保持关闭，防止哈工程(HEU)校园网等环境下的 IPv6 路由黑洞
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true

# -------------------------------------------------------------------
# TUN 模式 (Android 核心设置)
# 确保所有 App 流量都能通过虚拟网卡被 Clash 接管
# -------------------------------------------------------------------
tun:
  enable: true
  stack: mixed             # 混合堆栈，兼顾性能与兼容性
  dns-hijack:
    - "any:53"             # 劫持所有 53 端口的 DNS 请求
  auto-route: true         # 自动设置路由表
  auto-detect-interface: true # 自动检测出口网卡（移动数据/Wi-Fi 切换必备）

# 流量探测
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

# DNS 优化 (适配 Android 的 Fake-IP 模式)
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
    - tls://8.8.4.4
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# -------------------------------------------------------------------
# 代理节点
# -------------------------------------------------------------------
proxies:
  # 节点 1: Reality
  - name: "测试节点2-k523t2pu"
    type: vless
    server: 23.95.214.55
    port: 52314
    uuid: 752f32be-c3cf-4bf9-9c13-0ed931fe69a5
    udp: true
    tls: true
    network: tcp
    servername: swdist.apple.com
    reality-opts:
      public-key: g-Wofh6JtFrQ1yFaXWAy0kj_Oaxt1zRctT5B7NSW4CY
      short-id: "93"
    client-fingerprint: chrome

  # 节点 2: Cloudflare 隧道 (HEU 优化)
  - name: "HEU-Cloudflare-Bobo"
    type: vless
    server: bobowang.icu
    port: 443
    uuid: d12d6ddf-6bab-4ca8-aabb-40bbe4f1463c
    tls: true
    udp: true
    skip-cert-verify: true 
    network: ws
    servername: bobowang.icu
    alpn: [h2, http/1.1]
    ws-opts:
      path: /lab-stream
      headers:
        Host: bobowang.icu
    client-fingerprint: chrome

# -------------------------------------------------------------------
# 代理组
# -------------------------------------------------------------------
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎯 全局直连
      - "HEU-Cloudflare-Bobo"
      - "测试节点2-k523t2pu"

  - name: ♻️ 自动选择
    type: url-test
    url: https://www.google.com/generate_204 
    interval: 300
    tolerance: 50
    proxies:
      - "HEU-Cloudflare-Bobo"
      - "测试节点2-k523t2pu"

  - name: 🤖 人工智能
    type: select
    proxies:
      - 🚀 节点选择
      - "HEU-Cloudflare-Bobo"
      - "测试节点2-k523t2pu"
      - 🎯 全局直连

  - name: 📱 社交/视频 (B站/知乎)
    type: select
    proxies:
      - 🎯 全局直连
      - 🚀 节点选择

  - name: 🧱 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全局直连

  - name: 🎯 全局直连
    type: select
    proxies:
      - DIRECT

# -------------------------------------------------------------------
# 规则集 (Rule Providers)
# -------------------------------------------------------------------
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

# -------------------------------------------------------------------
# 规则逻辑
# -------------------------------------------------------------------
rules:
  # 广告拦截
  - RULE-SET,reject,REJECT

  # AI 工具
  - DOMAIN-SUFFIX,openai.com,🤖 人工智能
  - DOMAIN-SUFFIX,anthropic.com,🤖 人工智能
  - DOMAIN-SUFFIX,gemini.google.com,🤖 人工智能
  - DOMAIN-SUFFIX,chatgpt.com,🤖 人工智能

  # 国内常用社交/视频
  - DOMAIN-KEYWORD,bilibili,📱 社交/视频 (B站/知乎)
  - DOMAIN-KEYWORD,zhihu,📱 社交/视频 (B站/知乎)

  # 通用分类
  - RULE-SET,icloud,🎯 全局直连
  - RULE-SET,google,🚀 节点选择
  - RULE-SET,proxy,🚀 节点选择
  - RULE-SET,direct,🎯 全局直连

  # 地理位置分流
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  
  # 最终兜底
  - MATCH,🧱 漏网之鱼
